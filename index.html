<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Karla Miami Pilates</title>
	<!-- Optional but recommended -->
	<meta name="description" content="Personal Pilates training in Miami. Weekly availability across Vibrant Pilates, Pure Motion Pilates, and Laira Balance.">
	<link rel="stylesheet" href="css/styles.css">
</head>
	<body>
		<header><h1>Karla Miami Pilates</h1></header>

		<section id="calendar">
		  <h2>Weekly Availability</h2>
		  <div class="table-wrapper">
			<table id="schedule">
			  <thead>
				<tr>
				  <th scope="col">Time</th>
				  <th scope="col">Monday</th>
				  <th scope="col">Tuesday</th>
				  <th scope="col">Wednesday</th>
				  <th scope="col">Thursday</th>
				  <th scope="col">Friday</th>
				</tr>
			  </thead>
			  <tbody></tbody>
			</table>
		  </div>
			<div class="legend">
			  <h3>Studios & Locations</h3>
			  <div id="legend"></div>
			</div>		  
		</section>
		
		<script src="js/calendar.js"></script>

	</body>
</html>
